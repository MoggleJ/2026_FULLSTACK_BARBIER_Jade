<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      width: 100%;
      max-width: 520px;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #f8fafc;
    }

    h1 span {
      color: #6366f1;
    }

    .add-form {
      display: flex;
      gap: 0.5rem;
      width: 100%;
      max-width: 520px;
      margin-bottom: 1.5rem;
    }

    .add-form input {
      flex: 1;
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 0.5rem;
      color: #e2e8f0;
      font-size: 0.95rem;
      padding: 0.6rem 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .add-form input:focus {
      border-color: #6366f1;
    }

    .add-form input::placeholder {
      color: #64748b;
    }

    .add-form button {
      background: #6366f1;
      border: none;
      border-radius: 0.5rem;
      color: #fff;
      cursor: pointer;
      font-size: 1.2rem;
      padding: 0.6rem 1rem;
      transition: background 0.15s;
    }

    .add-form button:hover {
      background: #4f46e5;
    }

    .filters {
      display: flex;
      gap: 0.5rem;
      width: 100%;
      max-width: 520px;
      margin-bottom: 1rem;
    }

    .filter-btn {
      background: none;
      border: 1px solid #2d3148;
      border-radius: 0.4rem;
      color: #94a3b8;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0.3rem 0.75rem;
      transition: all 0.15s;
    }

    .filter-btn.active, .filter-btn:hover {
      background: #1e2130;
      border-color: #6366f1;
      color: #e2e8f0;
    }

    .task-list {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .task-item {
      align-items: center;
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 0.5rem;
      display: flex;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      transition: border-color 0.15s;
    }

    .task-item:hover {
      border-color: #3d4268;
    }

    .task-item.done {
      opacity: 0.5;
    }

    .task-check {
      appearance: none;
      background: #0f1117;
      border: 2px solid #4b5563;
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      height: 1.1rem;
      transition: all 0.15s;
      width: 1.1rem;
    }

    .task-check:checked {
      background: #6366f1;
      border-color: #6366f1;
    }

    .task-label {
      flex: 1;
      font-size: 0.95rem;
    }

    .task-item.done .task-label {
      text-decoration: line-through;
    }

    .task-delete {
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0.2rem;
      transition: color 0.15s;
    }

    .task-delete:hover {
      color: #f87171;
    }

    .empty {
      color: #475569;
      font-size: 0.9rem;
      text-align: center;
      padding: 2rem 0;
    }

    .count {
      color: #64748b;
      font-size: 0.8rem;
      margin-top: 1rem;
      text-align: right;
      width: 100%;
      max-width: 520px;
    }
  </style>
</head>
<body>

  <header>
    <h1>MJ <span>Tasks</span></h1>
  </header>

  <form class="add-form" id="addForm">
    <input id="taskInput" type="text" placeholder="Nouvelle tâche…" autocomplete="off" />
    <button type="submit">+</button>
  </form>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">Toutes</button>
    <button class="filter-btn" data-filter="todo">À faire</button>
    <button class="filter-btn" data-filter="done">Terminées</button>
  </div>

  <ul class="task-list" id="taskList"></ul>
  <p class="count" id="count"></p>

  <script>
    const STORAGE_KEY = 'mj_tasks';
    let filter = 'all';
    let tasks = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

    const save = () => localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));

    const render = () => {
      const list = document.getElementById('taskList');
      const count = document.getElementById('count');
      const visible = tasks.filter(t =>
        filter === 'all' ? true : filter === 'done' ? t.done : !t.done
      );

      list.innerHTML = visible.length === 0
        ? `<li class="empty">Aucune tâche</li>`
        : visible.map(t => `
          <li class="task-item${t.done ? ' done' : ''}" data-id="${t.id}">
            <input class="task-check" type="checkbox" ${t.done ? 'checked' : ''} />
            <span class="task-label">${t.text}</span>
            <button class="task-delete" title="Supprimer">✕</button>
          </li>
        `).join('');

      const done = tasks.filter(t => t.done).length;
      count.textContent = `${done} / ${tasks.length} terminée${done > 1 ? 's' : ''}`;

      list.querySelectorAll('.task-check').forEach((cb, i) => {
        cb.addEventListener('change', () => {
          tasks.find(t => t.id === visible[i].id).done = cb.checked;
          save(); render();
        });
      });

      list.querySelectorAll('.task-delete').forEach((btn, i) => {
        btn.addEventListener('click', () => {
          tasks = tasks.filter(t => t.id !== visible[i].id);
          save(); render();
        });
      });
    };

    document.getElementById('addForm').addEventListener('submit', e => {
      e.preventDefault();
      const input = document.getElementById('taskInput');
      const text = input.value.trim();
      if (!text) return;
      tasks.unshift({ id: Date.now(), text, done: false });
      input.value = '';
      save(); render();
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        filter = btn.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });

    render();
  </script>

</body>
</html>
