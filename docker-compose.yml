services:

  # ── Base de données PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: mjqbe_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-mjqbe}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - db_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-mjqbe}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Express ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: dev
    container_name: mjqbe_backend
    command: sh -c "npm install && npm fund && npm run dev"
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-mjqbe}
      PORT: ${PORT:-5000}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-10}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:5000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads:/app/uploads
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network
      - db_network

  # ── Frontend React + Vite (dev) ──────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: mjqbe_frontend
    working_dir: /app
    command: sh -c "npm install && npm fund && npm run dev"
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_OAUTH_GOOGLE_ENABLED: ${VITE_OAUTH_GOOGLE_ENABLED:-false}
      VITE_OAUTH_GITHUB_ENABLED: ${VITE_OAUTH_GITHUB_ENABLED:-false}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - app_network

volumes:
  pgdata:
  uploads:

networks:
  app_network:
  db_network:
